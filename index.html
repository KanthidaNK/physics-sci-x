<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics No.7 & Sci-X Academy | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600&display=swap');

        :root {
            --bg: #020204;
            --panel: #0a0e1a;
            --neon-cyan: #00f5ff;
            --neon-purple: #9d00ff;
            --text: #e0e0e0;
            --text-dim: #7a7a8c;
            --grid: rgba(0, 245, 255, 0.1);
        }

        * { 
            box-sizing: border-box; 
            box-shadow: none !important;
            text-shadow: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
        }

        header {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px 20px;
            text-align: center;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
        }

        .glitch {
            color: var(--neon-cyan);
            animation: flicker 3s infinite alternate;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            33% { opacity: 0.8; }
            66% { opacity: 0.9; }
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        main {
            width: 100%;
            max-width: 1000px;
            padding: 30px 20px;
            flex-grow: 1;
        }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 20px;
        }

        @media (max-width: 700px) {
            .grid-container { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
        }

        .card {
            border: 1px solid rgba(0, 245, 255, 0.3);
            padding: 30px;
            background: linear-gradient(135deg, rgba(10, 14, 26, 0.9), rgba(2, 2, 4, 0.9));
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 245, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        .card:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.2), inset 0 0 20px rgba(0, 245, 255, 0.05);
            transform: translateY(-2px);
        }

        .card:hover::before { opacity: 1; }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            color: var(--neon-cyan);
        }

        .card p {
            color: var(--text-dim);
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .game-panel {
            border: 1px solid var(--neon-purple);
            padding: 40px;
            background: var(--panel);
            margin-top: 20px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(157, 0, 255, 0.3);
        }

        .game-header h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-purple);
            margin: 0;
        }

        .btn {
            font-family: 'Space Grotesk', sans-serif;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 8px 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--neon-cyan);
            color: var(--bg);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .question {
            font-size: 1.2rem;
            margin-bottom: 25px;
            line-height: 1.6;
            border-left: 3px solid var(--neon-cyan);
            padding-left: 15px;
        }

        .options {
            display: grid;
            gap: 12px;
        }

            padding: 15px;
            border: 1px solid rgba(224, 224, 224, 0.2);
            background: rgba(2, 2, 4
