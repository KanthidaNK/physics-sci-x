<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังนิทานอัจฉริยะสองภาษา // © Xero Studio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        /* โซนกล่องอัจฉริยะสำหรับใส่นิทานใหม่ */
        .import-zone {
            background: #ffffff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            max-width: 650px;
            width: 100%;
            box-sizing: border-box;
        }
        .import-zone textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-family: monospace;
            resize: vertical;
            box-sizing: border-box;
        }
        .import-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            font-size: 16px;
        }
        .import-btn:hover { background-color: #27ae60; }
        
        .book-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 650px;
            width: 100%;
        }
        .story-title {
            text-align: center;
            color: #2c3e50;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .page-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .cover-card {
            border: 2px solid #3498db;
            background: linear-gradient(to bottom, #ffffff, #f7fafd);
        }
        .page-number {
            font-weight: bold;
            color: #3498db;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cover-badge {
            background-color: #e74c3c;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            text-transform: uppercase;
        }
        .story-img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            background-color: #eaeaea;
            margin-bottom: 5px;
        }
        .story-text {
            font-size: 17px;
            line-height: 1.8;
            color: #2c3e50;
            margin: 5px 0;
        }
        .audio-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .audio-btn:hover { background-color: #2980b9; }
        .prompt-box {
            background-color: #f8f9fa;
            border-left: 4px solid #2ecc71;
            padding: 12px;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            color: #7f8c8d;
        }
        .prompt-text {
            background: #ffffff;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-top: 5px;
            user-select: all;
        }
    </style>
</head>
<body>

<div class="import-zone">
    <label style="font-weight: bold; color: #2c3e50; display:block; margin-bottom: 8px;">📥 นำเข้านิทานเรื่องใหม่ (วาง JSON จากเจมส์ที่นี่):</label>
    <textarea id="jsonInput" placeholder="วางโค้ด JSON ที่คัดลอกมาจากเจมส์ตรงนี้..."></textarea>
    <button class="import-btn" onclick="loadUserJson()">⚡ เสกนิทานขึ้นหน้าเว็บทันที</button>
</div>

<div class="book-container">
    <h1 id="book-title" class="story-title">รอใส่ข้อมูลนิทาน...</h1>
    <div id="storybook-pages"></div>
</div>

<script>
    function loadUserJson() {
        const rawData = document.getElementById('jsonInput').value.trim();
        if(!rawData) {
            alert("กรุณาวางโค้ด JSON ก่อนครับ");
            return;
        }
        try {
            const parsedData = JSON.parse(rawData);
            renderStory(parsedData);
            document.getElementById('jsonInput').value = ""; 
        } catch(e) {
            alert("❌ โค้ด JSON ไม่ถูกต้อง กรุณาก๊อปปี้จากเจมส์มาให้ครบถ้วนครับ!");
        }
    }

    function renderStory(data) {
        const titleText = (data.title_th && data.title_en) ? `${data.title_th} (${data.title_en})` : (data.title || "นิทานโดย Xero Studio");
        document.getElementById('book-title').innerText = titleText;
        
        const pagesContainer = document.getElementById('storybook-pages');
        pagesContainer.innerHTML = ''; 

        if (data.type === "cover") {
            const coverCard = document.createElement('div');
            coverCard.className = 'page-card cover-card';
            
            const currentCoverUrl = "cover.png";
            const imgHTML = `<img src="${currentCoverUrl}" class="story-img" onerror="this.style.display='none';">`;

            coverCard.innerHTML = `
                <div class="page-number">
                    <span class="cover-badge">OFFICIAL COVER</span>
                    <span style="color: #7f8c8d; font-size: 13px; font-weight: bold;">© Xero Studio</span>
                </div>
                ${imgHTML}
                <div class="prompt-box" style="border-left-color: #3498db; background-color: #f0f7fc;">
                    <strong style="color: #2980b9;">🎨 คัดลอก Prompt สำหรับสร้างภาพหน้าปก:</strong>
                    <div class="prompt-text">${data.cover_prompt}</div>
                </div>
            `;
            pagesContainer.appendChild(coverCard);
        } 
        else if (data.pages && Array.isArray(data.pages)) {
            data.pages.forEach((page) => {
                const card = document.createElement('div');
                card.className = 'page-card';
                
                const currentImgUrl = `p${page.page_number}.png`;
                const imgHTML = `<img src="${currentImgUrl}" class="story-img" onerror="this.style.display='none';">`;
                
                const textThai = page.story_text_th || "";
                const textEng = page.story_text_en || "";
                const engHTML = textEng ? `<p class="story-text" style="color: #57606f; font-style: italic;"><b>EN:</b> ${textEng}</p>` : '';

                card.innerHTML = `
                    <div class="page-number">
                        <span>หน้าที่ ${page.page_number}</span>
                        <button class="audio-btn" onclick="speakText('${escapeJS(textThai)}')">🔊 อ่านให้ฟัง</button>
                    </div>
                    ${imgHTML}
                    <p class="story-text"><b>TH:</b> ${textThai}</p>
                    ${engHTML}
                    <div class="prompt-box" id="pbox-${page.page_number}">
                        <strong>🎨 คัดลอก Prompt นี้ไปสร้างภาพ:</strong>
                        <div class="prompt-text">${page.image_prompt}</div>
