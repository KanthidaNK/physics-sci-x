<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแสดงผล Storybook อัจฉริยะ // © Xero Studio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .book-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 650px;
            width: 100%;
        }
        .story-title {
            text-align: center;
            color: #2c3e50;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .page-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .cover-card {
            border: 2px solid #3498db;
            background: linear-gradient(to bottom, #ffffff, #f7fafd);
        }
        .page-number {
            font-weight: bold;
            color: #3498db;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cover-badge {
            background-color: #e74c3c;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .story-img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            background-color: #eaeaea;
        }
        .story-text {
            font-size: 17px;
            line-height: 1.8;
            color: #2c3e50;
        }
        .audio-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s;
        }
        .audio-btn:hover {
            background-color: #2980b9;
        }
        .prompt-box {
            background-color: #f8f9fa;
            border-left: 4px solid #2ecc71;
            padding: 12px;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            color: #7f8c8d;
        }
        .prompt-text {
            background: #ffffff;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-top: 5px;
            user-select: all;
        }
    </style>
</head>
<body>
